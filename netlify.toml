[build]
command = "npm install"
functions = "netlify/functions"
publish = "public"
# Skip auto-build on every push (saves credits). Trigger deploys manually in the Netlify UI.
ignore = "exit 0"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

[[edge_functions]]
path = "/*"
function = "auth"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

